<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Path Tracer</title>

    <!-- Import CSS stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <canvas id="c"></canvas>
    <div id="loading">COMPILING SHADERS...<p>WebGL 2.0 · Path Tracer</p>
    </div>
    <div id="ui" style="display:none">
        <h3>Path Tracer</h3>
        <div class="row"><span>Samples</span><span class="v" id="samp">0</span></div>
        <div class="row"><span>FPS</span><span class="v" id="fps">-</span></div>
        <div class="row"><span>Resolution</span><span class="v" id="reso">-</span></div>
        <div class="sep"></div>

        <h3 style="margin-top: 8px;">Sun Settings</h3>
        <div class="time-sync">
            <input type="checkbox" id="useRealTime">
            <label for="useRealTime">Sync to Real Time</label>
        </div>

        <label>Sun Elevation: <span id="sunElV">8.0</span>°</label>
        <input type="range" id="sunEl" min="0" max="90" value="8" step="0.5">

        <label>Sun Rotation: <span id="sunAzV">160</span>°</label>
        <input type="range" id="sunAz" min="0" max="360" value="160" step="1">

        <label>Sun Intensity: <span id="sunIntV">1.0</span></label>
        <input type="range" id="sunInt" min="0.1" max="5.0" value="1.0" step="0.1">

        <label>Sun Size: <span id="sunSizeV">1.0</span></label>
        <input type="range" id="sunSize" min="0.5" max="3.0" value="1.0" step="0.1">

        <div class="sep"></div>
        <label>Exposure: <span id="expoV">1.20</span></label>
        <input type="range" id="expo" min="0.2" max="4.0" value="1.2" step="0.05">
        <label>Denoise: <span id="denoiseV">0.80</span></label>
        <input type="range" id="denoise" min="0" max="1" value="0.8" step="0.05">
        <div class="sep"></div>
        <button id="reset">Reset Accumulation</button>
        <button id="save">Save PNG</button>
    </div>
    <div id="hint">LMB drag: orbit | Scroll: zoom | MMB/RMB drag: pan</div>
    <div id="err"></div>

    <!-- Js entry point -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
